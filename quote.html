<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N47 Quote Request</title>

    <link rel="stylesheet" href="quote.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="quote.js" defer></script>
</head>
<body>

    <nav>
        <div class="logo">MySite</div>

        <div class="hamburger" id="hamburger">
            ☰
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="#">Services</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <div class="card">

        <h2>N47 Timing Chain Quote</h2>

        <label>
            Your Name
            <input type="text" id="customerName" placeholder="Name" required>
        </label>
        <label>
            Your Email
            <input type="email" id="customerEmail" placeholder="Email" required>
        </label>
        <label>
            Your Phone Number
            <input type="number" id="customerNumber" placeholder="Phone Number" required>
        </label>
        <label>
            Car Registration Plate
            <input type="text" id="carReg" placeholder="Car Registration" required>
        </label>

        <label>
            Chain Brand
            <select id="chainBrand" required>
                <option value="">Select Timing Chain Option</option>
                <option value="FAI Timing Chain" data-price="1100" data-stars="4/5">
                    FAI Timing Chain (4/5) — £1,100
                </option>
                <option value="Febi Bilstein" data-price="1350" data-stars="4/5">
                    Febi Bilstein (4/5) — £1,350
                </option>
                <option value="IWIS OEM BMW" data-price="1600" data-stars="5/5">
                    IWIS OEM BMW (5/5) — £1,600
                </option>
            </select>
        </label>

        <div class="extras-section">
            <h3>Optional Extras</h3>

            <div class="extras-row">

                <label class="extra-item">
                    <input type="checkbox" value="Coolant Flange" data-cost="60" data-laboursave="0">
                    <img src="images/coolantflange.png" alt="Coolant Flange">
                    <span>
                        <maintext>Coolant Flange</maintext>
                        <smallblack>Prone to cracking due to age</smallblack>
                        <smallgreen>+£60 (Recommended)</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Oil Filter Housing Gasket" data-cost="90" data-laboursave="0">
                    <img src="images/oilfilterhousing.png" alt="Oil Filter Housing">
                    <span>
                        <maintext>Oil Filter Housing Gasket</maintext>
                        <smallblack>Common Oil Leak</smallblack>
                        <smallgreen>+£90 (Highly Recommended)</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Water Pump / Thermostat" data-cost="150" data-laboursave="0">
                    <img src="images/waterpumpandthermostat.png" alt="Water Pump / Thermostat">
                    <span>
                        <maintext>Water Pump / Thermostat</maintext>
                        <smallblack>Service Item</smallblack>
                        <smallgreen>+£150</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Clutch Replacement" data-cost="300" data-laboursave="0">
                    <img src="images/Clutchreplacnemt.png" alt="Clutch">
                    <span>
                        <maintext>Clutch Replacement</maintext>
                        <smallblack>Service Item</smallblack>
                        <smallgreen>+£300 (Recommended)</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Clutch Replacement + DMF" data-cost="900" data-laboursave="0">
                    <img src="images/dualmassflywheel.png" alt="Clutch + DMF">
                    <span>
                        <maintext>Clutch Replacement + DMF</maintext>
                        <smallblack>Service Item</smallblack>
                        <smallgreen>+£900</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Exhuast Clamp + Gasket" data-cost="50" data-laboursave="0">
                    <img src="images/exhaustgasket.png" alt="Exhuast Clamp + Gasket">
                    <span>
                        <maintext>Exhuast Clamp + Gasket</maintext>
                        <smallblack>Common Exhuast Leak (Smell Exhuast Gases? Replace)</smallblack>
                        <smallgreen>+£50</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Front Shaft Seal" data-cost="50" data-laboursave="0">
                    <img src="images/frontmainseal.png" alt="Front Shaft Seal">
                    <span>
                        <maintext>Front Shaft Seal</maintext>
                        <smallblack>Common Oil Leak</smallblack>
                        <smallgreen>+£50</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Dipstick + Oil Level Sensor Seal" data-cost="40" data-laboursave="0">
                    <img src="images/dipstickgaskets.png" alt="Dipstick + Oil Level Sensor Seal">
                    <span>
                        <maintext>Dipstick + Oil Level Sensor Seal</maintext>
                        <smallblack>Less Common Oil Leak</smallblack>
                        <smallgreen>+£40</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Intermediate Housing Seal" data-cost="40" data-laboursave="0">
                    <img src="images/intermediate housinggasket.png" alt="Intermediate Housing Seal">
                    <span>
                        <maintext>Intermediate Housing Seal</maintext>
                        <smallblack>Common Oil Leak into Injectors</smallblack>
                        <smallgreen>+£40</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Aux Belt Replacement" data-cost="35" data-laboursave="0">
                    <img src="images/auxbelt.png" alt="Aux Belt Replacement">
                    <span>
                        <maintext>Aux Belt Replacement</maintext>
                        <smallblack>Service Item</smallblack>
                        <smallgreen>+£35</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Intake Manifold Seals" data-cost="125" data-laboursave="0">
                    <img src="images/intakeseals.png" alt="Intake Manifold Seals">
                    <span>
                        <maintext>Intake Manifold Seals</maintext>
                        <smallblack>Less Common Boost Leaks</smallblack>
                        <smallgreen>+£125</smallgreen>
                    </span>
                </label>

                <label class="extra-item">
                    <input type="checkbox" value="Engine Mounts" data-cost="225" data-laboursave="0">
                    <img src="images/enginemounts.png" alt="Engine Mounts">
                    <span>
                        <maintext>Engine Mounts</maintext>
                        <smallblack>Reduces Engine Vibrations Inside Cabin</smallblack>
                        <smallgreen>+£225</smallgreen>
                    </span>
                </label>

            </div>
        </div>

        <div class="quote-summary">
            <p id="quoteTotal">Estimated Quote Total: £0 VAT Included</p>
        </div>

        <button onclick="sendEmail()">Request Quote</button>
        <p id="statusMessage"></p>



    </div>

</body>
</html>
